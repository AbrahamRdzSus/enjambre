<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ENJAMBRE">
  <defs>
    <linearGradient id="enj-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc637"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="enj-core" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#ffd66b"/>
      <stop offset="1" stop-color="#ffb020"/>
    </radialGradient>
  </defs>

  <!-- Anillo hexagonal exterior (flat-top) -->
  <polygon points="60,32 46,56.25 18,56.25 4,32 18,7.75 46,7.75"
    fill="none" stroke="url(#enj-g)" stroke-width="2.6" stroke-linejoin="round"/>

  <!-- Conectores centro -> nodos -->
  <g stroke="#8b5cf6" stroke-opacity="0.55" stroke-width="1.4">
    <line x1="32" y1="32" x2="49" y2="32"/>
    <line x1="32" y1="32" x2="40.5" y2="46.72"/>
    <line x1="32" y1="32" x2="23.5" y2="46.72"/>
    <line x1="32" y1="32" x2="15" y2="32"/>
    <line x1="32" y1="32" x2="23.5" y2="17.28"/>
    <line x1="32" y1="32" x2="40.5" y2="17.28"/>
  </g>

  <!-- Puntos en los vertices (ambar) -->
  <g fill="#ffc637">
    <circle cx="60" cy="32" r="2.2"/>
    <circle cx="46" cy="56.25" r="2.2"/>
    <circle cx="18" cy="56.25" r="2.2"/>
    <circle cx="4" cy="32" r="2.2"/>
    <circle cx="18" cy="7.75" r="2.2"/>
    <circle cx="46" cy="7.75" r="2.2"/>
  </g>

  <!-- Nodos del enjambre (morado) -->
  <g fill="#a78bfa">
    <circle cx="49" cy="32" r="4.6"/>
    <circle cx="40.5" cy="46.72" r="4.6"/>
    <circle cx="23.5" cy="46.72" r="4.6"/>
    <circle cx="15" cy="32" r="4.6"/>
    <circle cx="23.5" cy="17.28" r="4.6"/>
    <circle cx="40.5" cy="17.28" r="4.6"/>
  </g>

  <!-- Nucleo hexagonal (ambar) -->
  <polygon points="41,32 36.5,39.79 27.5,39.79 23,32 27.5,24.21 36.5,24.21" fill="url(#enj-core)"/>
</svg>
