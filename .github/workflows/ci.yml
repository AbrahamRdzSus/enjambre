name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  audit:
    name: deps audit (${{ matrix.kind }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kind: [python, frontend, landing]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ matrix.kind == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # pip-audit: falla si alguna dependencia (incl. transitivas) tiene CVE conocido.
      # --skip-editable salta el propio paquete `enjambre` (no esta en PyPI).
      - name: pip-audit (core + api + gui + dev)
        if: ${{ matrix.kind == 'python' }}
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e ".[api,gui,dev]"
          pip-audit --skip-editable

      - name: Set up Node
        if: ${{ matrix.kind != 'python' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.kind }}/package-lock.json

      # npm audit del arbol pineado (package-lock.json); falla en severidad high+.
      - name: npm audit
        if: ${{ matrix.kind != 'python' }}
        working-directory: ${{ matrix.kind }}
        run: npm audit --audit-level=high

  web:
    name: web (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [frontend, landing]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint (solo frontend)
        if: ${{ matrix.dir == 'frontend' }}
        run: npm run lint

      - name: Build
        run: npm run build
